    <script>
        var errCount = 0;
        window.onloadTurnstileCallback = function () {
            turnstile.render("#cfts", {
                sitekey: "0x4AAAAAAAarpkvdua7P4myE",
                callback: function (token) {
                    $.ajax({
                        url: "/verify.php",
                        type: "POST",
                        dataType: "json",
                        data: {
                            verify_token: token,
                        },
                        success: function (response) {
                            console.log('验证结果:', response)
                            if (response.code != 200 || response.data == undefined || response.data == '') {
                                if (errCount > 3) {
                                    return;
                                }
                                errCount++;
                                alert('验证失败，正在重新验证');
                                turnstile.reset("#cfts");
                                return;
                            }
                            document.cookie = response.data;
                            window.location.reload();

                            //window.close();
                        },
                        error: function (xhr, status, error) {
                            console.error("Ajax请求失败：", error);
                            if (errCount > 3) {
                                return;
                            }
                            errCount++;
                            turnstile.reset("#cfts");

                        },
                    });
                },
            });
        };
    </script>
